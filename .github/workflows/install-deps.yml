name: Install Dependencies Cache
on:
  workflow_dispatch:
  push:
    branches:
      - cursor/setup-deps-08e8

jobs:
  install:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cursor/setup-deps-08e8
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Package dependencies
        run: |
          # Create tar of node_modules (with max compression)
          tar cf - $(find . -maxdepth 3 -name node_modules -not -path '*/node_modules/*/node_modules' | sort) | gzip -9 > /tmp/node-modules.tar.gz
          ls -lh /tmp/node-modules.tar.gz
          
          # Copy lockfile
          cp pnpm-lock.yaml /tmp/pnpm-lock.yaml

      - name: Push dependencies to orphan branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create a fresh orphan branch for deps
          git checkout --orphan deps-cache
          git rm -rf . 2>/dev/null || true
          
          # Split into 90MB chunks (under GitHub 100MB limit)
          mkdir -p deps
          split -b 90M /tmp/node-modules.tar.gz deps/nm.tar.gz.part-
          cp /tmp/pnpm-lock.yaml deps/
          
          # Create manifest
          ls -lh deps/ > deps/MANIFEST.txt
          echo "Total parts: $(ls deps/nm.tar.gz.part-* | wc -l)" >> deps/MANIFEST.txt
          
          cat deps/MANIFEST.txt
          
          git add deps/
          git commit -m "deps: cached node_modules for cloud agent"
          git push origin deps-cache --force
