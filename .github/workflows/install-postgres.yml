name: Package PostgreSQL
on:
  workflow_dispatch:
  push:
    branches:
      - cursor/setup-deps-08e8
    paths:
      - '.github/workflows/install-postgres.yml'

jobs:
  package-postgres:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cursor/setup-deps-08e8
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install and package PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql postgresql-client libpq5
          
          pg_version=$(ls /usr/lib/postgresql/)
          echo "PostgreSQL version: $pg_version"
          
          # Package PostgreSQL binaries AND libpq
          tar czf /tmp/postgresql.tar.gz \
            /usr/lib/postgresql/ \
            /usr/share/postgresql/ \
            /usr/bin/pg_* \
            /usr/bin/psql \
            /usr/bin/createdb \
            /usr/bin/dropdb \
            /usr/bin/createuser \
            /usr/bin/dropuser \
            /usr/bin/initdb \
            $(find /usr/lib/x86_64-linux-gnu -name "libpq*" 2>/dev/null) \
            2>/dev/null || true
          
          ls -lh /tmp/postgresql.tar.gz

      - name: Push to deps-cache branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git fetch origin deps-cache
          git checkout deps-cache
          
          cp /tmp/postgresql.tar.gz deps/
          
          # Remove old pg-libs since we've merged it into postgresql.tar.gz
          rm -f deps/pg-libs.tar.gz
          
          ls -lh deps/
          
          git add deps/
          git commit -m "deps: update PostgreSQL package with libpq" || echo "No changes"
          git push origin deps-cache --force
