openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: specials
    description: Daily and weekly specials
  - name: gallery
    description: Photo gallery
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /specials:
    get:
      operationId: listSpecials
      tags: [specials]
      summary: List all specials
      description: Returns all current specials ordered by date descending
      responses:
        "200":
          description: List of specials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Special"
    post:
      operationId: createSpecial
      tags: [specials]
      summary: Create a special
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSpecialBody"
      responses:
        "201":
          description: Created special
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Special"

  /specials/current:
    get:
      operationId: getCurrentSpecials
      tags: [specials]
      summary: Get today's active specials
      description: Returns today's featured specials for the home page preview
      responses:
        "200":
          description: Current specials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Special"

  /specials/{id}:
    get:
      operationId: getSpecial
      tags: [specials]
      summary: Get a single special
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Special found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Special"
        "404":
          description: Not found
    put:
      operationId: updateSpecial
      tags: [specials]
      summary: Update a special
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSpecialBody"
      responses:
        "200":
          description: Updated special
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Special"
    delete:
      operationId: deleteSpecial
      tags: [specials]
      summary: Delete a special
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /gallery:
    get:
      operationId: listGallery
      tags: [gallery]
      summary: List gallery photos
      responses:
        "200":
          description: Gallery photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryPhoto"
    post:
      operationId: createGalleryPhoto
      tags: [gallery]
      summary: Add a gallery photo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGalleryPhotoBody"
      responses:
        "201":
          description: Created photo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryPhoto"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /gallery/{id}:
    delete:
      operationId: deleteGalleryPhoto
      tags: [gallery]
      summary: Delete a gallery photo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Special:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        price:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        category:
          type: string
          description: "daily or weekly"
        isActive:
          type: boolean
        featuredDate:
          type: string
          description: ISO date string (YYYY-MM-DD)
        createdAt:
          type: string
          description: ISO datetime string
      required:
        - id
        - title
        - description
        - category
        - isActive
        - featuredDate
        - createdAt

    CreateSpecialBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        category:
          type: string
          description: "daily or weekly"
        isActive:
          type: boolean
        featuredDate:
          type: string
          description: ISO date string (YYYY-MM-DD)
      required:
        - title
        - description
        - category
        - isActive
        - featuredDate

    UpdateSpecialBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: string
          nullable: true
        imageUrl:
          type: string
          nullable: true
        category:
          type: string
        isActive:
          type: boolean
        featuredDate:
          type: string

    GalleryPhoto:
      type: object
      properties:
        id:
          type: integer
        imageUrl:
          type: string
        caption:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        sortOrder:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - imageUrl
        - sortOrder
        - createdAt

    CreateGalleryPhotoBody:
      type: object
      properties:
        imageUrl:
          type: string
        caption:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        sortOrder:
          type: integer
      required:
        - imageUrl
        - sortOrder

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
