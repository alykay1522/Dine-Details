kind = "web"
previewPath = "/"
title = "Restaurant Website"
version = "1.0.0"
id = "artifacts/restaurant-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23920

[services.development]
run = "pnpm --filter @workspace/restaurant-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/restaurant-site", "run", "build" ]
publicDir = "artifacts/restaurant-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23920"
BASE_PATH = "/"
